<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudinary Upload Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 20px; text-align: center; margin: 20px 0; }
        .result { margin: 20px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        img { max-width: 200px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Cloudinary Upload Test</h1>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept="image/*" />
        <p>Select an image to test upload</p>
    </div>
    
    <button onclick="testUpload()">Upload to Cloudinary</button>
    <div id="result"></div>

    <script>
        async function testUpload() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const resultDiv = document.getElementById('result');
            
            if (!file) {
                resultDiv.innerHTML = '<div class="error">Please select a file first</div>';
                return;
            }
            
            const cloudName = 'dv0heb3cz';
            const uploadPreset = 'alumni_uploads';
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);
            formData.append('folder', 'alumni-platform/test');
            
            resultDiv.innerHTML = '<div class="result">Uploading...</div>';
            
            try {
                console.log('Starting upload to Cloudinary...');
                console.log('Cloud name:', cloudName);
                console.log('Upload preset:', uploadPreset);
                console.log('File:', file.name, file.type, file.size);
                
                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
                    {
                        method: 'POST',
                        body: formData
                    }
                );
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('Upload failed:', errorData);
                    throw new Error(errorData.error?.message || `Upload failed with status ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Upload successful:', data);
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h3>Upload Successful!</h3>
                        <p><strong>URL:</strong> ${data.secure_url}</p>
                        <p><strong>Public ID:</strong> ${data.public_id}</p>
                        <p><strong>Size:</strong> ${data.width}x${data.height}</p>
                        <img src="${data.secure_url}" alt="Uploaded image" />
                    </div>
                `;
                
            } catch (error) {
                console.error('Upload error:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>Upload Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p>Check the console for more details.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
